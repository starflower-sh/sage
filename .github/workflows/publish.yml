name: Publish Images

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - init-extensions.sql
      - .github/workflows/publish.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/starflower-sh/sage-postgres

jobs:
  publish:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        pg_version:
          - "15"
          - "16"
          - "17"
          - "18"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            PG_VERSION=${{ matrix.pg_version }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ matrix.pg_version }}
